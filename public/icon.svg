<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Focus Vision">
  <defs>
    <!-- Background — calm teal with a subtle vertical fall-off for depth. -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a695e" />
      <stop offset="55%" stop-color="#2b5249" />
      <stop offset="100%" stop-color="#1c3a34" />
    </linearGradient>
    <!-- Iris — warm sand → gold so the eye reads from across the room. -->
    <radialGradient id="iris" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#f5ead3" />
      <stop offset="48%" stop-color="#d8b87a" />
      <stop offset="100%" stop-color="#8a6a3a" />
    </radialGradient>
    <!-- Soft top sheen on the iris — gives it a glassy, lit look. -->
    <radialGradient id="sheen" cx="35%" cy="28%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <!-- Top-of-canvas highlight, very subtle. -->
    <radialGradient id="topGlow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background fills the full canvas so the icon works masked
       (Android squircle, iOS rounded square) and unmasked. -->
  <rect width="512" height="512" fill="url(#bg)" />
  <rect width="512" height="512" fill="url(#topGlow)" />

  <!-- Outer "FOCUS" ring — cream on teal for clean contrast. -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#f7efd9" stroke-width="14" />

  <!-- Iris — warm gold gradient. -->
  <circle cx="256" cy="256" r="108" fill="url(#iris)" />

  <!-- Iris radial "rays" for a bit of life. -->
  <g stroke="#8a6a3a" stroke-width="2" opacity="0.45">
    <line x1="256" y1="170" x2="256" y2="190" />
    <line x1="256" y1="322" x2="256" y2="342" />
    <line x1="170" y1="256" x2="190" y2="256" />
    <line x1="322" y1="256" x2="342" y2="256" />
    <line x1="196" y1="196" x2="210" y2="210" />
    <line x1="316" y1="196" x2="302" y2="210" />
    <line x1="196" y1="316" x2="210" y2="302" />
    <line x1="316" y1="316" x2="302" y2="302" />
  </g>

  <!-- Pupil — deep teal, picks up the background. -->
  <circle cx="256" cy="256" r="42" fill="#1a3128" />

  <!-- Catchlight — top-left highlight that makes the eye feel alive. -->
  <ellipse cx="232" cy="234" rx="22" ry="16" fill="#ffffff" opacity="0.85" />
  <circle cx="218" cy="226" r="6" fill="#ffffff" />

  <!-- Glassy sheen overlay on the whole iris. -->
  <circle cx="256" cy="256" r="108" fill="url(#sheen)" />
</svg>
